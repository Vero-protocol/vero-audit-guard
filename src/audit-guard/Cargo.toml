[package]
name = "vero-audit-guard"
version = "0.1.0"
edition = "2021"
description = "Vero Protocol — Audit Guard module"

[lib]
crate-type = ["cdylib", "rlib"]

[dependencies]
soroban-sdk = { version = "21.0.0" }

[profile.release]
opt-level = "z"
overflow-checks = true

[dev-dependencies]
soroban-sdk = { version = "21.0.0", features = ["testutils"] }
