name: Security Scan

on:
  pull_request:
    branches: ["**"]
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC

permissions:
  contents: read
  security-events: write
  pull-requests: write

jobs:
  scanner-engine:
    name: Static Analysis (Rust/Soroban)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Cache Rust artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            scanner-engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('scanner-engine/Cargo.lock') }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Audit Rust dependencies for known vulnerabilities
        run: cargo audit --deny warnings
        working-directory: scanner-engine

      - name: Build scanner-engine
        run: cargo build --release
        working-directory: scanner-engine

      - name: Run static analysis
        run: |
          mkdir -p ../reports
          if [ -d "vero-core-contracts" ]; then
            ./target/release/scanner ../vero-core-contracts | tee ../reports/latest-scan.json
          else
            echo '{"target":"N/A","total_files":0,"findings":[],"report_hash":"N/A"}' \
              > ../reports/latest-scan.json
          fi
        working-directory: scanner-engine

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: scan-report
          path: reports/latest-scan.json

  anomaly-detector:
    name: Anomaly Detector Tests (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: anomaly-detector/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: anomaly-detector

      - name: Run tests
        run: npm test
        working-directory: anomaly-detector

  audit-trail:
    name: Audit Trail Build (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: verifiable-audit-trail/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: verifiable-audit-trail

      - name: Build
        run: npm run build
        working-directory: verifiable-audit-trail

  security-health-check:
    name: Security Health Check
    runs-on: ubuntu-latest
    needs: [scanner-engine, anomaly-detector, audit-trail]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: src/audit-guard/package-lock.json

      - name: Install audit-guard dependencies
        run: npm ci
        working-directory: src/audit-guard

      - name: Download scan report
        uses: actions/download-artifact@v4
        with:
          name: scan-report
          path: reports/

      - name: Run security gate
        run: npm run security-gate
        working-directory: src/audit-guard
        env:
          SCAN_REPORT_FILE: ../../reports/latest-scan.json
          SECURITY_SEVERITY_THRESHOLD: "3"

      - name: Post status to PR
        if: success() && github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "✅ **Vero Security Health Check passed.** No findings above severity threshold."
            });
